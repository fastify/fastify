name: AI Code Review

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write

jobs:
  review:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout target repo
        uses: actions/checkout@v4

      - name: Checkout review-bot
        uses: actions/checkout@v4
        with:
          repository: scaleapi/gps-sandbox
          path: gps-sandbox
          sparse-checkout: apps/review-bot

      - name: Set up uv
        uses: astral-sh/setup-uv@v6

      - name: Install dependencies
        run: uv sync
        working-directory: gps-sandbox/apps/review-bot

      - name: Run AI code review
        run: uv run python -m src.main
        working-directory: gps-sandbox/apps/review-bot
        env:
          GITHUB_TOKEN: ${{ secrets.BOT_PAT }}
          LITELLM_API_KEY: ${{ secrets.LITELLM_API_KEY }}
          LITELLM_API_BASE: ${{ secrets.LITELLM_API_BASE }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
